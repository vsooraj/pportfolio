<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | K S Pranav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@400;600&family=Dancing+Script:wght@600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <style>
    .form-control {
      background-color: var(--surface-strong);
      border: 1px solid var(--line);
      padding: 0.75rem 1rem;
      color: var(--text);
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.25rem rgba(196, 106, 47, 0.25);
    }
    .hero-section-contact {
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at top right, rgba(196, 106, 47, 0.12), transparent 40%);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg py-3 fixed-top nav-glass">
    <div class="container">
        <a class="navbar-brand brand-mark" href="index.html">K S Pranav</a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
          data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="mainNav">
          <ul class="navbar-nav gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#education">Education</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="login.html">Admin Login</a></li>
          </ul>
        </div>
    </div>
  </nav>

  <header class="hero-section hero-section-contact">
  </header>

  <main>
    <section class="section-space">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-6 col-lg-5">
            <div class="contact-panel text-start p-4 p-md-5">
              <p class="section-tag text-center">Secure Area</p>
              <h2 class="section-title mb-4 text-center">Admin Login</h2>
              
              <form id="loginForm">
                <div class="mb-4">
                  <label for="username" class="form-label fw-bold">Username</label>
                  <input type="text" class="form-control rounded-3" id="username" placeholder="Enter username" required>
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label fw-bold">Password</label>
                  <input type="password" class="form-control rounded-3" id="password" placeholder="Enter password" required>
                </div>
                <div class="d-grid mt-4">
                  <button type="submit" class="btn btn-accent btn-lg">Login</button>
                </div>
                <p id="errorMessage" class="text-danger mt-3 text-center d-none">Invalid username or password.</p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      
      // Hardcoded credentials as requested
      if (user === "admin" && pass === "admin123") {
        sessionStorage.setItem("isAdminLoggedIn", "true");
        window.location.href = "list_contacts.html";
      } else {
        document.getElementById("errorMessage").classList.remove("d-none");
      }
    });
  </script>
</body>

</html>
