<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Submissions | K S Pranav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@400;600&family=Dancing+Script:wght@600;700&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero-section-contact {
      position: relative;
      overflow: hidden;
      background: radial-gradient(circle at top right, rgba(196, 106, 47, 0.12), transparent 40%);
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg py-3 fixed-top nav-glass">
    <div class="container">
        <a class="navbar-brand brand-mark" href="index.html">K S Pranav</a>
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
          data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="mainNav">
          <ul class="navbar-nav gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="index.html#education">Education</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="list_contacts.html">Submissions</a></li>
          </ul>
        </div>
    </div>
  </nav>

  <header class="hero-section hero-section-contact">
  </header>

  <main>
    <section class="section-space">
      <div class="container">
        <div class="text-center mb-5">
          <p class="section-tag">Admin View</p>
          <h1 class="section-title">Contact Submissions</h1>
        </div>
        
        <div class="contact-panel p-4 p-md-5">
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Subject</th>
                  <th>Message</th>
                </tr>
              </thead>
              <tbody id="contactsTableBody">
                <!-- Rows populated by Javascript -->
                <tr>
                    <td colspan="5" class="text-center text-muted">Loading submissions...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

  <script>
    async function fetchContacts() {
      try {
        const response = await fetch("https://backportfolio-cccjb3ekcvd9e2a5.centralindia-01.azurewebsites.net/contacts/");
        
        if (!response.ok) {
            throw new Error("Failed to fetch");
        }
        
        const data = await response.json();
        const tbody = document.getElementById('contactsTableBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No submissions found.</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        
        data.forEach(contact => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><strong>${contact.id}</strong></td>
            <td>${contact.first_name} ${contact.last_name}</td>
            <td><a href="mailto:${contact.email}" class="text-decoration-none" style="color: var(--accent);">${contact.email}</a></td>
            <td>${contact.subject}</td>
            <td style="max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${contact.message}">
                ${contact.message}
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch(e) {
        console.error(e);
        const tbody = document.getElementById('contactsTableBody');
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error connecting to the Live Azure Backend! Please check the server logs.</td></tr>';
      }
    }

    // Call on load
    fetchContacts();
  </script>
</body>

</html>
